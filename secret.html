<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上ヶ原クイズ - 裏モード</title>
    <style>
        :root {
            --primary-color: #ef4444; /* 裏モードは情熱の「赤」 */
            --danger-color: #b91c1c;
            --bg-color: #0f172a;     /* ディープなダーク背景 */
            --card-color: #1e293b;   /* カード背景もダーク */
            --text-color: #f8fafc;   /* 文字は明るい白 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #334155;
        }
        .screen { display: none; }
        .active { display: block; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #f87171; letter-spacing: 2px; }
        h2 { font-size: 20px; margin-bottom: 16px; min-height: 56px; line-height: 1.4; }
        .btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: background 0.2s, border-color 0.2s;
            font-weight: bold;
            box-sizing: border-box;
        }
        .btn:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; }
        .choice-btn {
            background-color: #334155;
            color: var(--text-color);
            border: 2px solid #475569;
            text-align: left;
        }
        .btn.correct-choice {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .btn.wrong-choice {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #475569;
            background-color: #1e293b;
            color: var(--text-color);
            border-radius: 8px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        .sub-text {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 16px;
            text-align: center;
        }
        .timer-container {
            width: 100%;
            background-color: #334155;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.1s linear, background-color 0.1s;
        }
        .ranking-list { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: #1e293b;
            margin-bottom: 8px;
            border-radius: 6px;
            font-weight: bold;
            border: 1px solid #475569;
        }
        .version-text {
            font-size: 12px;
            color: #64748b;
            margin-top: -15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .ranking-item:nth-child(1) { background: #7f1d1d; color: #fca5a5; border-color: #b91c1c; }
        .ranking-item:nth-child(2) { background: #334155; color: #cbd5e1; border-color: #475569; }
        .ranking-item:nth-child(3) { background: #451a03; color: #fed7aa; border-color: #78350f; }
        .progress { font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
        .loading { color: #94a3b8; font-style: italic; margin: 10px 0; }
        .my-rank-text { font-size: 18px; margin: 12px 0; color: #f87171; font-weight: bold; }
        .save-status-text { font-size: 14px; color: #cbd5e1; margin-top: 10px; font-weight: bold; }
    </style>
</head>

<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>上ヶ原クイズ【裏】</h1>
        <div class="version-text">v1.0 HARD MODE</div> 
        <p style="color: #cbd5e1; font-size: 14px; line-height: 1.6;">
            ⚠️ ここからは真の上ヶ原通にしか解けない難問の世界です。<br>
            早く答えるほど高得点！裏の頂点を目指せ！
        </p>
        
        <input type="text" id="username" class="input-field" placeholder="裏のコードネーム（最大8文字）" maxlength="8" oninput="checkInputName()">
        <span class="sub-text">※裏モード専用のランキングに登録されます</span>
        
        <button class="btn" id="start-btn" onclick="startQuiz()" disabled>難問を読み込み中...</button>
        <button class="btn choice-btn" style="text-align:center; background:#1e293b;" onclick="showRanking()">裏ランキングを見る</button>
        <button class="btn choice-btn" style="text-align:center; background:#0f172a; border-color:#334155;" onclick="goHome()">表の世界に戻る</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress" id="progress">第 -- 問 / 10</div>
        <div class="timer-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
        <h2 id="question">問題文がここに入ります</h2>
        <div id="choices"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <h2>裏スコア: <span id="score" style="color:var(--primary-color);">0</span> 点</h2>
        
        <div id="my-rank" class="my-rank-text">順位を計算中...</div>
        <div id="save-status" class="save-status-text">Supabaseに保存中...</div>
        
        <button class="btn" onclick="showRanking()" style="margin-top: 20px;">裏ランキングを見る</button>
        <button class="btn choice-btn" style="text-align:center; background:#1e293b;" onclick="goHome()">表の世界に戻る</button>
    </div>

    <div id="ranking-screen" class="screen">
        <h1>💀 裏トップ10 ランキング</h1>
        <div id="ranking-board"></div>
        <button class="btn" onclick="backToStart()">裏トップに戻る</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://vfavodpjxtwpgntaxrzf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_8mKj4iiHpme95zNqxFSNwA_a8mJ5U5r";

    let allQuestions = [];
    let quizData = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let registeredName = ""; 
    let isQuestionsLoaded = false; 

    const LIMIT_TIME = 20;
    let timeLeft = LIMIT_TIME;
    let timerInterval = null;
    let questionStartTime = 0;

    function shuffle(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    async function initApp() {
        // 裏用のローカルストレージ名でニックネームを分離して保存
        const savedName = localStorage.getItem('secret_quiz_nickname');
        if (savedName) {
            document.getElementById('username').value = savedName;
        } else {
            document.getElementById('username').value = "浮田潤"; // 初期値
        }

        await loadSecretQuestions();
    }

    async function loadSecretQuestions() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/secret_questions`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) throw new Error(`エラー (${response.status})`);
            
            allQuestions = await response.json();
            if (allQuestions && allQuestions.length > 0) {
                isQuestionsLoaded = true;
                checkInputName(); 
            } else {
                document.getElementById('start-btn').innerText = "問題データがありません";
            }
        } catch (error) {
            document.getElementById('start-btn').innerText = "通信エラー発生";
            alert("❌ 裏問題の取得に失敗しました。テーブル名「secret_questions」があるか確認してください。");
        }
    }

    // ★ 修正・追加箇所
    function checkInputName() {
        const nameInput = document.getElementById('username').value.trim();
        const startBtn = document.getElementById('start-btn');
        
        if (isQuestionsLoaded) {
            if (nameInput === "浮田潤") {
                // 「浮田潤」が入力された場合の制御
                startBtn.innerText = "浮田潤では始められないゾ！";
                startBtn.disabled = true;
            } else if (nameInput.length > 0) {
                // 正常に入力されている場合
                startBtn.innerText = "裏モードを開始";
                startBtn.disabled = false;
            } else {
                // 未入力の場合
                startBtn.innerText = "ニックネームを入力してください";
                startBtn.disabled = true;
            }
        }
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    async function startQuiz() {
        const startBtn = document.getElementById('start-btn');
        const inputName = document.getElementById('username').value.trim();
        registeredName = inputName || "無名";
        
        startBtn.disabled = true;
        startBtn.innerText = "重複チェック中...";

        const localSavedName = localStorage.getItem('secret_quiz_nickname');

        try {
            if (registeredName !== localSavedName) {
                // secret_ranking から重複チェック
                const checkUrl = `${SUPABASE_URL}/rest/v1/secret_ranking?name=eq.${encodeURIComponent(registeredName)}&limit=1`;
                const checkResponse = await fetch(checkUrl, {
                    method: "GET",
                    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
                });

                if (!checkResponse.ok) throw new Error("名前の重複チェックに失敗しました");
                const existingRecords = await checkResponse.json();

                if (existingRecords.length > 0) {
                    const proceed = confirm(
                        `⚠️ 「${registeredName}」はすでに使用されています。\n\n続行しますか？（ハイスコア時は上書きされます）`
                    );
                    if (!proceed) {
                        startBtn.disabled = false;
                        checkInputName();
                        return; 
                    }
                }
            }

            localStorage.setItem('secret_quiz_nickname', registeredName);

            currentQuestionIndex = 0;
            currentScore = 0;
            const shuffledList = shuffle(allQuestions);
            quizData = shuffledList.slice(0, 10);
            changeScreen('quiz-screen');
            showQuestion();

        } catch (error) {
            alert("⚠️ エラーが発生しました:\n" + error.message);
            startBtn.disabled = false;
            checkInputName();
        }
    }

    function showQuestion() {
        clearInterval(timerInterval);
        const data = quizData[currentQuestionIndex];
        document.getElementById('progress').innerText = `第 ${currentQuestionIndex + 1} 問 / ${quizData.length}`;
        document.getElementById('question').innerText = data.question;
        
        const correctText = data.choices[Number(data.answer)];
        let wrappedChoices = data.choices.map((text) => {
            return { text: text, isCorrect: (text === correctText) };
        });
        wrappedChoices = shuffle(wrappedChoices);
        
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = '';
        
        wrappedChoices.forEach((choice) => {
            const button = document.createElement('button');
            button.innerText = choice.text;
            button.className = 'btn choice-btn';
            button.onclick = (e) => checkAnswer(choice.isCorrect, e.target);
            choicesContainer.appendChild(button);
        });

        timeLeft = LIMIT_TIME;
        questionStartTime = Date.now();
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--primary-color)";

        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - questionStartTime) / 1000;
            timeLeft = LIMIT_TIME - elapsed;

            if (timeLeft <= 0) {
                timeLeft = 0;
                timerBar.style.width = "0%";
                clearInterval(timerInterval);
                disableAllButtons();
                setTimeout(() => nextQuestion(), 1500);
            } else {
                timerBar.style.width = `${(timeLeft / LIMIT_TIME) * 100}%`;
                if (timeLeft < 3) {
                    timerBar.style.backgroundColor = "var(--danger-color)";
                }
            }
        }, 50);
    }

    function disableAllButtons() {
        const buttons = document.querySelectorAll('#choices .btn');
        buttons.forEach(btn => btn.disabled = true);
    }

    function checkAnswer(isCorrect, clickedButton) {
        clearInterval(timerInterval); 
        disableAllButtons(); 

        if (isCorrect) {
            clickedButton.classList.add('correct-choice');
            clickedButton.innerText = "⭕ " + clickedButton.innerText;
            const bonus = Math.round(timeLeft * 55); 
            currentScore += (5000 + bonus);
        } else {
            clickedButton.classList.add('wrong-choice');
            clickedButton.innerText = "❌ " + clickedButton.innerText;
        }
        
        setTimeout(() => nextQuestion(), 1700);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    async function showResult() {
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('my-rank').innerText = "現在の裏順位を計算中...";
        document.getElementById('save-status').innerText = "裏スコアを確認中...";
        changeScreen('result-screen');

        await autoSaveScore();

        try {
            // secret_ranking から順位計算
            const response = await fetch(`${SUPABASE_URL}/rest/v1/secret_ranking?score=gt.${currentScore}`, {
                method: "GET",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Prefer": "count=exact"
                }
            });
            
            const contentRange = response.headers.get("Content-Range");
            let higherCount = 0;
            if (contentRange) {
                higherCount = Number(contentRange.split("/")[1]);
            } else {
                const data = await response.json();
                higherCount = data.length;
            }

            const myRank = higherCount + 1;
            document.getElementById('my-rank').innerText = `あなたの暫定裏順位: ${myRank} 位！`;
        } catch (error) {
            document.getElementById('my-rank').innerText = "裏順位の取得に失敗しました";
        }
    }

    async function autoSaveScore() {
    const statusText = document.getElementById('save-status');
    
    try {
        // 1. 同一のプレイヤー名かつ「裏モードのデータ（is_secret=true）」の過去スコアを照会
        const checkUrl = `${SUPABASE_URL}/rest/v1/ranking?name=eq.${encodeURIComponent(registeredName)}&is_secret=eq.true&order=score.desc&limit=1`;
        const checkResponse = await fetch(checkUrl, {
            method: "GET",
            headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
        });

        if (!checkResponse.ok) throw new Error("過去スコアの照会に失敗しました");
        const existingRecords = await checkResponse.json();

        if (existingRecords.length > 0) {
            const pastHighScore = existingRecords[0].score;
            if (currentScore <= pastHighScore) {
                statusText.innerText = `💡 過去の裏攻略スコア（${pastHighScore.toLocaleString()}点）を超えなかったため、ランキングは更新されませんでした。`;
                return; 
            }

            // 2. 過去の裏スコアより高ければ、PATCHでスコアを更新
            statusText.innerText = "裏攻略のハイスコアを更新中...";
            const updateUrl = `${SUPABASE_URL}/rest/v1/ranking?name=eq.${encodeURIComponent(registeredName)}&is_secret=eq.true`;
            const updateResponse = await fetch(updateUrl, {
                method: "PATCH",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ score: currentScore })
            });
            if (!updateResponse.ok) throw new Error("データの更新に失敗しました");
            
        } else {
            // 3. 初めての裏クリアなら、新規登録（is_secret: true を渡す！）
            statusText.innerText = "裏攻略の偉業を表ランキングに記録中...";
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    name: registeredName, 
                    score: currentScore,
                    is_secret: true // ←ここでフラグを立てる！
                })
            });
            
            if (!response.ok) throw new Error();
        }
        statusText.innerText = "✨ 裏モード攻略の証が、表の総合ランキングに刻まれました！";

    } catch (error) {
        statusText.innerText = "⚠️ スコアの自動保存に失敗しました。";
    }
}

    async function showRanking() {
        changeScreen('ranking-screen');
        const board = document.getElementById('ranking-board');
        board.innerHTML = '<p class="loading">最新データを読み込み中...</p>';
        
        try {
            // secret_ranking からトップ10を取得
            const response = await fetch(`${SUPABASE_URL}/rest/v1/secret_ranking?order=score.desc&limit=10`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) throw new Error();
            const ranking = await response.json();
            renderRanking(ranking);
        } catch (error) {
            board.innerHTML = '<p>データの取得に失敗しました。</p>';
        }
    }

    function renderRanking(ranking) {
        const board = document.getElementById('ranking-board');
        if (!ranking || ranking.length === 0) {
            board.innerHTML = '<p>まだ裏ランキングデータがありません。</p>';
            return;
        }
        let html = '<ul class="ranking-list">';
        ranking.forEach((item, index) => {
            html += `
                <li class="ranking-item">
                    <span>${index + 1}位: ${item.name}</span>
                    <span>${item.score.toLocaleString()}点</span>
                </li>
            `;
        });
        html += '</ul>';
        board.innerHTML = html;
    }

    function backToStart() {
        const savedName = localStorage.getItem('secret_quiz_nickname');
        if (savedName) {
            document.getElementById('username').value = savedName;
        }
        checkInputName();
        changeScreen('start-screen');
    }

    function goHome() {
        window.location.href = "index.html";
    }

    window.onload = initApp;
</script>
</body>
</html>
