<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速早押しクイズバトル</title>
    <style>
        :root {
            --primary-color: #3ecf8e;
            --danger-color: #ff4a5a;
            --bg-color: #1c1c1c;
            --card-color: #2e2e2e;
            --text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .screen { display: none; }
        .active { display: block; }
        h1 { font-size: 24px; margin-bottom: 20px; color: var(--primary-color); }
        h2 { font-size: 20px; margin-bottom: 16px; min-height: 56px; }
        .btn {
            background-color: var(--primary-color);
            color: #1c1c1c;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: background 0.2s, border-color 0.2s;
            font-weight: bold;
            box-sizing: border-box;
        }
        .btn:disabled { background-color: #4e4e4e; color: #aaa; cursor: not-allowed; }
        .choice-btn {
            background-color: #3e3e3e;
            color: var(--text-color);
            border: 2px solid #4e4e4e;
            text-align: left;
        }
        .btn.correct-choice {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .btn.wrong-choice {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #4e4e4e;
            background-color: #3e3e3e;
            color: white;
            border-radius: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .timer-container {
            width: 100%;
            background-color: #4e4e4e;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.1s linear, background-color 0.1s;
        }
        .ranking-list { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: #3e3e3e;
            margin-bottom: 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .ranking-item:nth-child(1) { background: #ffd700; color: #1c1c1c; }
        .ranking-item:nth-child(2) { background: #c0c0c0; color: #1c1c1c; }
        .ranking-item:nth-child(3) { background: #cd7f32; color: #1c1c1c; }
        .progress { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .loading { color: #aaa; font-style: italic; margin: 10px 0; }
        .my-rank-text { font-size: 18px; margin: 12px 0; color: #ffca28; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- スタート画面 -->
    <div id="start-screen" class="screen active">
        <h1>早押しクイズバトル</h1>
        <p>全10問のランダムクイズです。<br>早く答えるほど高得点！</p>
        <button class="btn" id="start-btn" onclick="startQuiz()" disabled>問題を読み込み中...</button>
        <button class="btn choice-btn" style="text-align:center;" onclick="showRanking()">共通ランキングを見る</button>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz-screen" class="screen">
        <div class="progress" id="progress">第 -- 問 / 10</div>
        <div class="timer-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
        <h2 id="question">問題文がここに入ります</h2>
        <div id="choices"></div>
    </div>

    <!-- 結果・名前入力画面 -->
    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <h2>総・得点: <span id="score" style="color:var(--primary-color);">0</span> 点</h2>
        
        <!-- 暫定順位の表示エリア -->
        <div id="my-rank" class="my-rank-text">順位を計算中...</div>
        
        <p>ランキングに名前を残しますか？</p>
        <input type="text" id="username" class="input-field" placeholder="名前を入力（最大8文字）" maxlength="8">
        
        <!-- その場で登録するか選べる2つのボタン -->
        <button class="btn" id="save-btn" onclick="saveScore()">名前を入力して送信する</button>
        <button class="btn choice-btn" style="text-align:center;" onclick="showRanking()">登録しないでランキングを見る</button>
        <div id="loading-text" class="loading" style="display:none;">Supabaseに保存中...</div>
    </div>

    <!-- ランキング画面 -->
    <div id="ranking-screen" class="screen">
        <h1>🏆 トップ10 ランキング</h1>
        <div id="ranking-board"></div>
        <button class="btn" onclick="goHome()">トップに戻る</button>
    </div>
</div>
<script>
    // ==========================================
    // 【最重要】ここにあなたのSupabaseの情報を正確に貼り付けてください
    // ==========================================
    const SUPABASE_URL = "https://vfavodpjxtwpgntaxrzf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_8mKj4iiHpme95zNqxFSNwA_a8mJ5U5r";

    let allQuestions = [];
    let quizData = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;

    const LIMIT_TIME = 10;
    let timeLeft = LIMIT_TIME;
    let timerInterval = null;
    let questionStartTime = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function initApp() {
        if (SUPABASE_URL.includes("ここにProject") || SUPABASE_ANON_KEY.includes("ここにAPI")) {
            alert("❌ 設定エラー:\nURLまたはAPIキーが初期状態のままです。お使いのSupabaseの値に書き換えてください。");
            document.getElementById('start-btn').innerText = "初期設定が必要です";
            return;
        }
        if (SUPABASE_URL.endsWith('/')) {
            alert("⚠️ 警告:\nSUPABASE_URLの最後に '/' が入っています。エラーの原因になるので消してください。");
        }
        await loadQuestions();
    }

    async function loadQuestions() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/questions`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`サーバー応答エラー (${response.status}): ${errText}`);
            }
            allQuestions = await response.json();
            if (allQuestions && allQuestions.length > 0) {
                const startBtn = document.getElementById('start-btn');
                startBtn.innerText = "スタート";
                startBtn.disabled = false;
            } else {
                document.getElementById('start-btn').innerText = "問題が0件です";
                alert("⚠️ 接続は成功しましたが、Supabaseのquestionsテーブルにデータが1件も入っていません。");
            }
        } catch (error) {
            document.getElementById('start-btn').innerText = "通信エラー発生";
            alert("❌ Supabaseへの接続に失敗しました。\n\n【エラー内容】\n" + error.message);
        }
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz() {
        currentQuestionIndex = 0;
        currentScore = 0;
        const shuffledList = shuffle([...allQuestions]);
        quizData = shuffledList.slice(0, 10);
        changeScreen('quiz-screen');
        showQuestion();
    }
    function showQuestion() {
        clearInterval(timerInterval);
        const data = quizData[currentQuestionIndex];
        document.getElementById('progress').innerText = `第 ${currentQuestionIndex + 1} 問 / ${quizData.length}`;
        document.getElementById('question').innerText = data.question;
        
        const correctText = data.choices[Number(data.answer)];
        let wrappedChoices = data.choices.map((text) => {
            return { text: text, isCorrect: (text === correctText) };
        });
        wrappedChoices = shuffle(wrappedChoices);
        
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = '';
        
        wrappedChoices.forEach((choice) => {
            const button = document.createElement('button');
            button.innerText = choice.text;
            button.className = 'btn choice-btn';
            button.onclick = (e) => checkAnswer(choice.isCorrect, e.target);
            choicesContainer.appendChild(button);
        });

        timeLeft = LIMIT_TIME;
        questionStartTime = Date.now();
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--primary-color)";

        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - questionStartTime) / 1000;
            timeLeft = LIMIT_TIME - elapsed;

            if (timeLeft <= 0) {
                timeLeft = 0;
                timerBar.style.width = "0%";
                clearInterval(timerInterval);
                disableAllButtons();
                setTimeout(() => nextQuestion(), 1500);
            } else {
                timerBar.style.width = `${(timeLeft / LIMIT_TIME) * 100}%`;
                if (timeLeft < 3) {
                    timerBar.style.backgroundColor = "var(--danger-color)";
                }
            }
        }, 50);
    }

    function disableAllButtons() {
        const buttons = document.querySelectorAll('#choices .btn');
        buttons.forEach(btn => btn.disabled = true);
    }

    function checkAnswer(isCorrect, clickedButton) {
        clearInterval(timerInterval);
        disableAllButtons();

        if (isCorrect) {
            clickedButton.classList.add('correct-choice');
            clickedButton.innerText = "🟢 正解！ " + clickedButton.innerText;
            const bonus = Math.round(timeLeft * 100);
            currentScore += (1000 + bonus);
        } else {
            clickedButton.classList.add('wrong-choice');
            clickedButton.innerText = "❌ 不正解... " + clickedButton.innerText;
            const data = quizData[currentQuestionIndex];
            const correctText = data.choices[Number(data.answer)];
            const buttons = document.querySelectorAll('#choices .btn');
            buttons.forEach(btn => {
                if (btn.innerText === correctText) btn.classList.add('correct-choice');
            });
        }
        setTimeout(() => nextQuestion(), 1500);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    async function showResult() {
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('username').value = '';
        document.getElementById('save-btn').disabled = false;
        document.getElementById('loading-text').style.display = 'none';
        document.getElementById('my-rank').innerText = "現在の順位を計算中...";
        changeScreen('result-screen');

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking?score=gt.${currentScore}`, {
                method: "GET",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Prefer": "count=exact"
                }
            });
            
            const contentRange = response.headers.get("Content-Range");
            let higherCount = 0;
            if (contentRange) {
                higherCount = Number(contentRange.split("/")[1]);
            } else {
                const data = await response.json();
                higherCount = data.length;
            }

            const myRank = higherCount + 1;
            document.getElementById('my-rank').innerText = `あなたの暫定順位: ${myRank} 位！`;
        } catch (error) {
            document.getElementById('my-rank').innerText = "順位の取得に失敗しました";
        }
    }

    async function saveScore() {
        const nameInput = document.getElementById('username').value.trim();
        const name = nameInput || "名無し";
        
        document.getElementById('save-btn').disabled = true;
        document.getElementById('loading-text').style.display = 'block';

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: name, score: currentScore })
            });
            if (!response.ok) throw new Error(await response.text());
            showRanking();
        } catch (error) {
            alert("⚠️ 保存エラー詳細: " + error.message);
            document.getElementById('save-btn').disabled = false;
            document.getElementById('loading-text').style.display = 'none';
        }
    }

    async function showRanking() {
        changeScreen('ranking-screen');
        const board = document.getElementById('ranking-board');
        board.innerHTML = '<p class="loading">最新データを読み込み中...</p>';
        
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking?order=score.desc&limit=10`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) throw new Error();
            const ranking = await response.json();
            renderRanking(ranking);
        } catch (error) {
            board.innerHTML = '<p>データの取得に失敗しました。</p>';
        }
    }

    function renderRanking(ranking) {
        const board = document.getElementById('ranking-board');
        if (!ranking || ranking.length === 0) {
            board.innerHTML = '<p>まだランキングデータがありません。</p>';
            return;
        }
        let html = '<ul class="ranking-list">';
        ranking.forEach((item, index) => {
            html += `
                <li class="ranking-item">
                    <span>${index + 1}位: ${item.name}</span>
                    <span>${item.score.toLocaleString()}点</span>
                </li>
            `;
        });
        html += '</ul>';
        board.innerHTML = html;
    }

    function goHome() { changeScreen('start-screen'); }

    window.onload = initApp;
</script>
</body>
</html>
