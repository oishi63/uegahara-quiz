<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速早押しクイズバトル</title>
    <style>
        :root {
            --primary-color: #3ecf8e;
            --danger-color: #ff4a5a;
            --bg-color: #1c1c1c;
            --card-color: #2e2e2e;
            --text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .screen { display: none; }
        .active { display: block; }
        h1 { font-size: 24px; margin-bottom: 20px; color: var(--primary-color); }
        h2 { font-size: 20px; margin-bottom: 16px; min-height: 56px; }
        .btn {
            background-color: var(--primary-color);
            color: #1c1c1c;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: background 0.2s;
            font-weight: bold;
            box-sizing: border-box;
        }
        .btn:disabled { background-color: #4e4e4e; color: #aaa; cursor: not-allowed; }
        .choice-btn {
            background-color: #3e3e3e;
            color: var(--text-color);
            border: 2px solid #4e4e4e;
            text-align: left;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #4e4e4e;
            background-color: #3e3e3e;
            color: white;
            border-radius: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        /* タイムゲージの見た目 */
        .timer-container {
            width: 100%;
            background-color: #4e4e4e;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.1s linear, background-color 0.1s;
        }
        .ranking-list { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: #3e3e3e;
            margin-bottom: 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .ranking-item:nth-child(1) { background: #ffd700; color: #1c1c1c; }
        .ranking-item:nth-child(2) { background: #c0c0c0; color: #1c1c1c; }
        .ranking-item:nth-child(3) { background: #cd7f32; color: #1c1c1c; }
        .progress { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .loading { color: #aaa; font-style: italic; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <!-- スタート画面 -->
    <div id="start-screen" class="screen active">
        <h1>早押しクイズバトル</h1>
        <p>全10問のランダムクイズです。<br>早く答えるほど高得点！</p>
        <button class="btn" id="start-btn" onclick="startQuiz()" disabled>問題を読み込み中...</button>
        <button class="btn choice-btn" style="text-align:center;" onclick="showRanking()">共通ランキングを見る</button>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz-screen" class="screen">
        <div class="progress" id="progress">第 -- 問 / 10</div>
        <!-- タイムゲージ -->
        <div class="timer-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
        <h2 id="question">問題文がここに入ります</h2>
        <div id="choices"></div>
    </div>

    <!-- 結果・名前入力画面 -->
    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <h2>総・得点: <span id="score" style="color:var(--primary-color);">0</span> 点</h2>
        <p>全国トップ10を狙って名前を登録しよう！</p>
        <input type="text" id="username" class="input-field" placeholder="名前を入力（最大8文字）" maxlength="8">
        <button class="btn" id="save-btn" onclick="saveScore()">スコアを送信</button>
        <div id="loading-text" class="loading" style="display:none;">Supabaseに保存中...</div>
    </div>

    <!-- ランキング画面 -->
    <div id="ranking-screen" class="screen">
        <h1>🏆 トップ10 ランキング</h1>
        <div id="ranking-board"></div>
        <button class="btn" onclick="goHome()">トップに戻る</button>
    </div>
</div>

<script>
    // 【重要】あなたのSupabase情報をここに入力してください
    const SUPABASE_URL = "https://vfavodpjxtwpgntaxrzf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_8mKj4iiHpme95zNqxFSNwA_a8mJ5U5r";

    let allQuestions = [];    // DBから取得した全問題リスト
    let quizData = [];        // 今回プレイする厳選10問
    let currentQuestionIndex = 0;
    let currentScore = 0;

    // タイマー用変数
    const LIMIT_TIME = 10;    // 1問につき10秒
    let timeLeft = LIMIT_TIME;
    let timerInterval = null;
    let questionStartTime = 0;

    // 配列をシャッフルする汎用関数（フィッシャー・イェーツのシャッフル）
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // アプリ起動時にSupabaseから全問題を一括取得
       // 【エラー診断付き】アプリ起動時にSupabaseから全問題を一括取得
    async function loadQuestions() {
        try {
            // URLの簡易チェック
            if (SUPABASE_URL.endsWith('/')) {
                alert("⚠️ 設定エラー: SUPABASE_URLの最後に '/' (スラッシュ) が入っています。消してください。");
            }

            const response = await fetch(`${SUPABASE_URL}/rest/v1/questions`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`サーバーエラー (${response.status}): ${errorText}`);
            }
            
            allQuestions = await response.json();
            
            if (allQuestions.length > 0) {
                const startBtn = document.getElementById('start-btn');
                startBtn.innerText = "スタート";
                startBtn.disabled = false;
            } else {
                document.getElementById('start-btn').innerText = "データベースに問題がありません";
                alert("⚠️ 警告: Supabaseのquestionsテーブルにデータが1件も入っていません。");
            }
        } catch (error) {
            document.getElementById('start-btn').innerText = "通信エラーが発生しました";
            alert("❌ 接続失敗エラー詳細:\n" + error.message);
            console.error(error);
        }
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // クイズ開始処理
    function startQuiz() {
        currentQuestionIndex = 0;
        currentScore = 0;
        
        // 1. 全問題からランダムに10問（DBの問題数が10問未満なら全問）を取り出す
        const shuffledList = shuffle([...allQuestions]);
        quizData = shuffledList.slice(0, 10);
        
        changeScreen('quiz-screen');
        showQuestion();
    }

    // 問題と選択肢を表示
    function showQuestion() {
        clearInterval(timerInterval);
        
        const data = quizData[currentQuestionIndex];
        document.getElementById('progress').innerText = `第 ${currentQuestionIndex + 1} 問 / ${quizData.length}`;
        document.getElementById('question').innerText = data.question;
        
        // 正解の文字列を退避させておく
        const correctText = data.choices[Number(data.answer)];
        
        // 2. 選択肢をランダムに並び替えるためのオブジェクト配列を作成
        let wrappedChoices = data.choices.map((text) => {
            return { text: text, isCorrect: (text === correctText) };
        });
        wrappedChoices = shuffle(wrappedChoices); // 選択肢をランダムシャッフル
        
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = '';
        
        wrappedChoices.forEach((choice) => {
            const button = document.createElement('button');
            button.innerText = choice.text;
            button.className = 'btn choice-btn';
            button.onclick = () => checkAnswer(choice.isCorrect);
            choicesContainer.appendChild(button);
        });

        // 3. タイマーの開始（10秒）
        timeLeft = LIMIT_TIME;
        questionStartTime = Date.now();
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--primary-color)";

        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - questionStartTime) / 1000;
            timeLeft = LIMIT_TIME - elapsed;

            if (timeLeft <= 0) {
                timeLeft = 0;
                timerBar.style.width = "0%";
                clearInterval(timerInterval);
                // 時間切れ時は不正解扱いで次の問題へ
                setTimeout(() => nextQuestion(), 600);
            } else {
                timerBar.style.width = `${(timeLeft / LIMIT_TIME) * 100}%`;
                if (timeLeft < 3) {
                    timerBar.style.backgroundColor = "var(--danger-color)"; // 残り3秒で赤ゲージに
                }
            }
        }, 50);
    }

    // 解答チェック
    function checkAnswer(isCorrect) {
        clearInterval(timerInterval); // タイマー停止

        if (isCorrect) {
            // 基本点1000点 ＋ 早押しボーナス（残り秒数×100点）
            const bonus = Math.round(timeLeft * 100);
            currentScore += (1000 + bonus);
        }
        
        nextQuestion();
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('username').value = '';
