<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上ヶ原クイズ</title>
    <style>
        :root {
            --primary-color: #2ec4b6; /* 爽やかなミントブルー */
            --danger-color: #ff4a5a;
            --bg-color: #f4f7f6;     /* 明るい薄グレーの背景 */
            --card-color: #ffffff;   /* カード背景は真っ白 */
            --text-color: #2c3e50;   /* 文字色は見やすい濃いグレー */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06); /* 柔らかい影 */
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .screen { display: none; }
        .active { display: block; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1e9489; }
        h2 { font-size: 20px; margin-bottom: 16px; min-height: 56px; }
        .btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: background 0.2s, border-color 0.2s;
            font-weight: bold;
            box-sizing: border-box;
        }
        .btn:disabled { background-color: #d1d5db; color: #9ca3af; cursor: not-allowed; }
        .choice-btn {
            background-color: #ffffff;
            color: var(--text-color);
            border: 2px solid #e2e8f0;
            text-align: left;
        }
        .btn.correct-choice {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .btn.wrong-choice {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            color: var(--text-color);
            border-radius: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .timer-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.1s linear, background-color 0.1s;
        }
        .ranking-list { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f8fafc;
            margin-bottom: 8px;
            border-radius: 6px;
            font-weight: bold;
            border: 1px solid #e2e8f0;
        }
        .version-text {
            font-size: 12px;
            color: #94a3b8; /* 薄いグレー */
            margin-top: -15px; /* タイトルとの隙間を詰める */
            margin-bottom: 20px;
            text-align: center;
        }
        .ranking-item:nth-child(1) { background: #fffbeb; color: #b45309; border-color: #fde68a; }
        .ranking-item:nth-child(2) { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .ranking-item:nth-child(3) { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
        .progress { font-size: 14px; color: #64748b; margin-bottom: 10px; }
        .loading { color: #64748b; font-style: italic; margin: 10px 0; }
        .my-rank-text { font-size: 18px; margin: 12px 0; color: #b45309; font-weight: bold; }
        .save-status-text { font-size: 14px; color: #4b5563; margin-top: 10px; font-weight: bold; }
    </style>
</head>

<body>

<div class="container">
    <div id="start-screen" class="screen active">
        <h1>上ヶ原クイズ</h1>
        <div class="version-text">v1.0</div> 
        <p>全10問のランダムクイズです。<br>早く答えるほど高得点！<br>君の上ヶ原への愛はいかに！<br>(ニックネームはランキングに登録される名前になるよ)</p>
        
        <input type="text" id="username" class="input-field" placeholder="ニックネームを入力（最大8文字）" maxlength="8" oninput="checkInputName()">
        
        <button class="btn" id="start-btn" onclick="startQuiz()" disabled>問題を読み込み中...</button>
        <button class="btn choice-btn" style="text-align:center;" onclick="showRanking()">共通ランキングを見る</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress" id="progress">第 -- 問 / 10</div>
        <div class="timer-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
        <h2 id="question">問題文がここに入ります</h2>
        <div id="choices"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <h2>スコア: <span id="score" style="color:var(--primary-color);">0</span> 点</h2>
        
        <div id="my-rank" class="my-rank-text">順位を計算中...</div>
        <div id="save-status" class="save-status-text">Supabaseに保存中...</div>
        
        <button class="btn" onclick="showRanking()" style="margin-top: 20px;">ランキングを見る</button>
    </div>

    <div id="ranking-screen" class="screen">
        <h1>🏆 トップ10 ランキング</h1>
        <div id="ranking-board"></div>
        <button class="btn" onclick="goHome()">トップに戻る</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://vfavodpjxtwpgntaxrzf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_8mKj4iiHpme95zNqxFSNwA_a8mJ5U5r";

    let allQuestions = [];
    let quizData = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let registeredName = ""; 
    let isQuestionsLoaded = false; 

    const LIMIT_TIME = 20;
    let timeLeft = LIMIT_TIME;
    let timerInterval = null;
    let questionStartTime = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function initApp() {
        if (SUPABASE_URL.includes("ここにProject") || SUPABASE_ANON_KEY.includes("ここにAPI")) {
            alert("❌ 設定エラー:\nURLまたはAPIキーが初期状態のままです。お使いのSupabaseの値に書き換えてください。");
            document.getElementById('start-btn').innerText = "初期設定が必要です";
            return;
        }
        if (SUPABASE_URL.endsWith('/')) {
            alert("⚠️ 警告:\nSUPABASE_URLの最後に '/' が入っています。エラーの原因になるので消してください。");
        }

        // 【追加】ローカルストレージから前回のニックネームを復元
        const savedName = localStorage.getItem('quiz_nickname');
        if (savedName) {
            document.getElementById('username').value = savedName;
        }

        await loadQuestions();
    }

    async function loadQuestions() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/questions`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`サーバー応答エラー (${response.status}): ${errText}`);
            }
            allQuestions = await response.json();
            if (allQuestions && allQuestions.length > 0) {
                isQuestionsLoaded = true;
                checkInputName(); 
            } else {
                document.getElementById('start-btn').innerText = "問題が0件です";
                alert("⚠️ 接続は成功しましたが、Supabaseのquestionsテーブルにデータが1件も入っていません。");
            }
        } catch (error) {
            document.getElementById('start-btn').innerText = "通信エラー発生";
            alert("❌ Supabaseへの接続に失敗しました。\n\n【エラー内容】\n" + error.message);
        }
    }

    function checkInputName() {
        const nameInput = document.getElementById('username').value.trim();
        const startBtn = document.getElementById('start-btn');
        if (isQuestionsLoaded) {
            if (nameInput.length > 0) {
                startBtn.innerText = "スタート";
                startBtn.disabled = false;
            } else {
                startBtn.innerText = "ニックネームを入力してください";
                startBtn.disabled = true;
            }
        }
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

   // 【修正版】名前が重複していても確認後に処理を継続できるスタート処理
    async function startQuiz() {
        const startBtn = document.getElementById('start-btn');
        const inputName = document.getElementById('username').value.trim();
        registeredName = inputName || "名無し";
        
        // ボタンを一時的に無効化
        startBtn.disabled = true;
        startBtn.innerText = "名前をチェック中...";

        const localSavedName = localStorage.getItem('quiz_nickname');

        try {
            // 入力された名前がブラウザに記憶されている名前と違う場合のみ重複チェック
            if (registeredName !== localSavedName) {
                
                // Supabaseに同じ名前がすでに登録されているか照会
                const checkUrl = `${SUPABASE_URL}/rest/v1/ranking?name=eq.${encodeURIComponent(registeredName)}&limit=1`;
                const checkResponse = await fetch(checkUrl, {
                    method: "GET",
                    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
                });

                if (!checkResponse.ok) throw new Error("名前の重複チェックに失敗しました");
                const existingRecords = await checkResponse.json();

                // すでに同じ名前が存在する場合
                if (existingRecords.length > 0) {
                    // 【ここを変更】警告ではなく、ユーザーに続行するかどうか選択させる
                    const proceed = confirm(
                        `⚠️ 「${registeredName}」というニックネームはすでに使用されています。\n\nこのままプレイを続行しますか？\n（ハイスコアを獲得した場合、既存のランキングデータは上書きされます）`
                    );
                    
                    // 「キャンセル（いいえ）」が押されたら処理を中断
                    if (!proceed) {
                        startBtn.disabled = false;
                        startBtn.innerText = "スタート";
                        return; 
                    }
                }
            }

            // 重複がない、またはユーザーが「はい」を選んだ場合はクイズ開始
            localStorage.setItem('quiz_nickname', registeredName);

            currentQuestionIndex = 0;
            currentScore = 0;
            const shuffledList = shuffle([...allQuestions]);
            quizData = shuffledList.slice(0, 10);
            changeScreen('quiz-screen');
            showQuestion();

        } catch (error) {
            alert("⚠️ エラーが発生しました:\n" + error.message);
            startBtn.disabled = false;
            startBtn.innerText = "スタート";
        }
    }

    function showQuestion() {
        clearInterval(timerInterval);
        const data = quizData[currentQuestionIndex];
        document.getElementById('progress').innerText = `第 ${currentQuestionIndex + 1} 問 / ${quizData.length}`;
        document.getElementById('question').innerText = data.question;
        
        const correctText = data.choices[Number(data.answer)];
        let wrappedChoices = data.choices.map((text) => {
            return { text: text, isCorrect: (text === correctText) };
        });
        wrappedChoices = shuffle(wrappedChoices);
        
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = '';
        
        wrappedChoices.forEach((choice) => {
            const button = document.createElement('button');
            button.innerText = choice.text;
            button.className = 'btn choice-btn';
            button.onclick = (e) => checkAnswer(choice.isCorrect, e.target);
            choicesContainer.appendChild(button);
        });

        timeLeft = LIMIT_TIME;
        questionStartTime = Date.now();
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--primary-color)";

        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - questionStartTime) / 1000;
            timeLeft = LIMIT_TIME - elapsed;

            if (timeLeft <= 0) {
                timeLeft = 0;
                timerBar.style.width = "0%";
                clearInterval(timerInterval);
                disableAllButtons();
                setTimeout(() => nextQuestion(), 1500);
            } else {
                timerBar.style.width = `${(timeLeft / LIMIT_TIME) * 100}%`;
                if (timeLeft < 3) {
                    timerBar.style.backgroundColor = "var(--danger-color)";
                }
            }
        }, 50);
    }

    function disableAllButtons() {
        const buttons = document.querySelectorAll('#choices .btn');
        buttons.forEach(btn => btn.disabled = true);
    }

   // 【修正版】ゲームバランスを見直した点数計算ロジック
    function checkAnswer(isCorrect, clickedButton) {
        clearInterval(timerInterval); // タイマー停止
        disableAllButtons(); // 他のボタンを押せないようにロック

        if (isCorrect) {
            // 【正解の場合】押したボタンを緑色にする
            clickedButton.classList.add('correct-choice');
            clickedButton.innerText = "⭕" + clickedButton.innerText;
            
            // タイムボーナスの影響をこれまでの1/10に縮小（最大20秒 × 10 = 200点）
            const bonus = Math.round(timeLeft * 10); 
            // 基本点 1,000点 + タイムボーナス（0〜200点）
            currentScore += (1000 + bonus);
        } else {
            // 【不正解の場合】押したボタンだけを赤色にする
            clickedButton.classList.add('wrong-choice');
            clickedButton.innerText = "❌" + clickedButton.innerText;
            
            // 不正解でもマイナスにしない
            // currentScore = Math.max(0, currentScore - 100);
        }
        
        // 1.7秒間、画面の色を確認させてから次の問題へ進む
        setTimeout(() => {
            nextQuestion();
        }, 1700);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    async function showResult() {
        document.getElementById('score').innerText = currentScore.toLocaleString();
        document.getElementById('my-rank').innerText = "現在の順位を計算中...";
        document.getElementById('save-status').innerText = "スコアを確認中...";
        changeScreen('result-screen');

        await autoSaveScore();

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking?score=gt.${currentScore}`, {
                method: "GET",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Prefer": "count=exact"
                }
            });
            
            const contentRange = response.headers.get("Content-Range");
            let higherCount = 0;
            if (contentRange) {
                higherCount = Number(contentRange.split("/")[1]);
            } else {
                const data = await response.json();
                higherCount = data.length;
            }

            const myRank = higherCount + 1;
            document.getElementById('my-rank').innerText = `あなたの暫定順位: ${myRank} 位！`;
        } catch (error) {
            document.getElementById('my-rank').innerText = "順位の取得に失敗しました";
        }
    }

  // 【完全解決版】既存データを削除してから登録する安全な上書きロジック
    async function autoSaveScore() {
        const statusText = document.getElementById('save-status');
        try {
            // ① 同じニックネームの過去レコードを1件取得（ハイスコア確認用）
            const checkUrl = `${SUPABASE_URL}/rest/v1/ranking?name=eq.${encodeURIComponent(registeredName)}&order=score.desc&limit=1`;
            const checkResponse = await fetch(checkUrl, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });

            if (!checkResponse.ok) throw new Error("過去のスコア照会に失敗しました");
            const existingRecords = await checkResponse.json();

            // ② 自己ベスト判定
            if (existingRecords.length > 0) {
                const pastHighScore = existingRecords[0].score;
                if (currentScore <= pastHighScore) {
                    statusText.innerText = `💡 自己ベスト（${pastHighScore.toLocaleString()}点）を超えなかったため、ランキングは更新されませんでした。`;
                    return; // スコアが低ければここで終了
                }

                // 【ここがポイント】古いスコアの方が低ければ、先にその古いレコードを削除する
                statusText.innerText = "古いデータを整理中...";
                const deleteResponse = await fetch(`${SUPABASE_URL}/rest/v1/ranking?name=eq.${encodeURIComponent(registeredName)}`, {
                    method: "DELETE",
                    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if (!deleteResponse.ok) throw new Error("古いデータの削除に失敗しました");
            }

            // ③ 新しいハイスコアをクリーンに新規登録（POST）
            statusText.innerText = "最新の自己ベストを保存中...";
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: registeredName, score: currentScore })
            });
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`新規登録エラー: ${errText}`);
            }
            statusText.innerText = "✨ 自己ベストが更新され、ランキングに登録されました！";

        } catch (error) {
            statusText.innerText = "⚠️ スコアの自動保存に失敗しました。";
            console.error("エラー詳細:", error);
        }
    }

    async function showRanking() {
        changeScreen('ranking-screen');
        const board = document.getElementById('ranking-board');
        board.innerHTML = '<p class="loading">最新データを読み込み中...</p>';
        
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/ranking?order=score.desc&limit=10`, {
                method: "GET",
                headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) throw new Error();
            const ranking = await response.json();
            renderRanking(ranking);
        } catch (error) {
            board.innerHTML = '<p>データの取得に失敗しました。</p>';
        }
    }

    function renderRanking(ranking) {
        const board = document.getElementById('ranking-board');
        if (!ranking || ranking.length === 0) {
            board.innerHTML = '<p>まだランキングデータがありません。</p>';
            return;
        }
        let html = '<ul class="ranking-list">';
        ranking.forEach((item, index) => {
            html += `
                <li class="ranking-item">
                    <span>${index + 1}位: ${item.name}</span>
                    <span>${item.score.toLocaleString()}点</span>
                </li>
            `;
        });
        html += '</ul>';
        board.innerHTML = html;
    }

    function goHome() {
        // 【修正】トップに戻っても名前は消さずに残す（そのまま連続プレイ可能に）
        const savedName = localStorage.getItem('quiz_nickname');
        if (savedName) {
            document.getElementById('username').value = savedName;
        }
        checkInputName();
        changeScreen('start-screen');
    }

    window.onload = initApp;
</script>
</body>
</html>
